@if (visible) {
  <svg class="arrows-overlay" viewBox="0 0 9 9" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <marker
        id="board-arrow-head"
        viewBox="0 0 1 1"
        refX="0.82"
        refY="0.5"
        markerWidth="4"
        markerHeight="4"
        orient="auto"
        markerUnits="strokeWidth"
      >
        <path d="M 0 0 L 1 0.5 L 0 1 z" fill="context-stroke" />
      </marker>
    </defs>

    @for (arrow of viewArrows; track arrow.id) {
      <g class="arrow-group">
        <line
          class="arrow-hit-area"
          [attr.x1]="arrow.x1"
          [attr.y1]="arrow.y1"
          [attr.x2]="arrow.x2"
          [attr.y2]="arrow.y2"
          [attr.stroke-width]="arrow.hitStrokeWidth"
          (mouseenter)="onArrowMouseEnter(arrow.id)"
          (mouseleave)="onArrowMouseLeave()"
          (click)="onArrowClickInternal($event, arrow.id)"
        />

        <line
          class="arrow-visible"
          [class.is-hovered]="arrow.isHovered"
          [attr.x1]="arrow.x1"
          [attr.y1]="arrow.y1"
          [attr.x2]="arrow.x2"
          [attr.y2]="arrow.y2"
          [attr.stroke]="arrow.color"
          [attr.stroke-width]="arrow.visualStrokeWidth"
          [attr.opacity]="arrow.opacity"
          stroke-linecap="round"
          [attr.marker-end]="'url(#board-arrow-head)'"
        />
      </g>
    }
  </svg>
}
